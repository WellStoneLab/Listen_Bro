name: listen_bro
description: Listen_Bro — 聞いてよ！マスター（バー経営カクテル＆会話ゲーム）
publish_to: none
version: 0.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/images/customers/
    - assets/audio/
